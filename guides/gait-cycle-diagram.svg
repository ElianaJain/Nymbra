<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 440" role="img" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif">
<title>Bipedal gait cycle — skeletal load concentration by phase</title>
<desc>Six phases of the human gait cycle shown as simplified skeletal figures. A load indicator bar below each figure shows the stress concentration at the stance-side hip, knee, and SIJ during that phase. This derives constraint DC-1.1 through DC-1.3.</desc>
<defs>
  <style>
    .label { font-size:12px; fill:#374151; }
    .sub { font-size:10px; fill:#6b7280; }
    .note { font-size:9px; fill:#9ca3af; }
    .title { font-size:12px; fill:#6b7280; }
    .bone { fill:none; stroke:#374151; stroke-linecap:round; }
    .ground { stroke:#d1d5db; stroke-width:1; }
    .load-bar { rx:2; }
    .hip-load { fill:#DC2626; opacity:0.7; }
    .knee-load { fill:#D97706; opacity:0.7; }
    .sij-load { fill:#1D4ED8; opacity:0.6; }
    .phase-label { font-size:11px; font-weight:600; fill:#374151; }
    .dc { font-size:9px; fill:#1D4ED8; }
  </style>
</defs>

<text class="title" x="340" y="20" text-anchor="middle">Bipedal gait cycle — skeletal load concentration by phase</text>
<text class="note" x="340" y="33" text-anchor="middle">Stance phase = ~60% of cycle. Single-leg stance concentrates full body weight at hip, knee, and SIJ simultaneously — the foundation for DC-1.1, DC-4.1</text>

<!-- Phase column spacing: 6 phases across 680px = ~113px each -->
<!-- Phase x centers: 56, 169, 282, 395, 508, 621 -->

<!-- ── PHASE 1: HEEL STRIKE ── x=56 -->
<text class="phase-label" x="56" y="55" text-anchor="middle">Heel strike</text>
<!-- Ground line -->
<line class="ground" x1="20" y1="290" x2="92" y2="290"/>
<!-- Simplified stance figure: left leg heel down, right leg swing -->
<ellipse cx="56" cy="100" rx="12" ry="14" class="bone" stroke-width="1.5"/>
<line class="bone" x1="56" y1="114" x2="56" y2="160" stroke-width="2"/>
<path d="M56 160 Q44 165 32 162" class="bone" stroke-width="2"/>
<path d="M56 160 Q68 180 72 210 L66 290" class="bone" stroke-width="2"/>
<line class="bone" x1="66" y1="290" x2="76" y2="291" stroke-width="2"/>
<path d="M56 160 Q50 200 46 240 Q44 270 48 290" class="bone" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
<!-- Load bars -->
<rect class="hip-load load-bar" x="22" y="306" width="68" height="7"/>
<rect class="knee-load load-bar" x="22" y="316" width="42" height="6"/>
<rect class="sij-load load-bar" x="22" y="325" width="55" height="5"/>
<text class="note" x="56" y="342" text-anchor="middle">high impact</text>
<text class="dc" x="56" y="352" text-anchor="middle">DC-1.1</text>

<!-- ── PHASE 2: LOADING RESPONSE ── x=169 -->
<text class="phase-label" x="169" y="55" text-anchor="middle">Loading response</text>
<line class="ground" x1="133" y1="290" x2="205" y2="290"/>
<ellipse cx="169" cy="100" rx="12" ry="14" class="bone" stroke-width="1.5"/>
<line class="bone" x1="169" y1="114" x2="169" y2="160" stroke-width="2"/>
<path d="M169 160 Q157 165 145 162" class="bone" stroke-width="2"/>
<path d="M169 160 Q178 182 182 218 L180 290" class="bone" stroke-width="2"/>
<line class="bone" x1="174" y1="290" x2="186" y2="290" stroke-width="2"/>
<path d="M169 160 Q162 200 160 250 Q158 270 162 290" class="bone" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
<!-- Load bars — peak hip -->
<rect class="hip-load load-bar" x="135" y="306" width="68" height="7"/>
<rect class="knee-load load-bar" x="135" y="316" width="60" height="6"/>
<rect class="sij-load load-bar" x="135" y="325" width="50" height="5"/>
<text class="note" x="169" y="342" text-anchor="middle">peak SIJ load</text>
<text class="dc" x="169" y="352" text-anchor="middle">DC-1.1 DC-4.1</text>

<!-- ── PHASE 3: MIDSTANCE ── x=282 -->
<text class="phase-label" x="282" y="55" text-anchor="middle">Midstance</text>
<line class="ground" x1="246" y1="290" x2="318" y2="290"/>
<ellipse cx="282" cy="100" rx="12" ry="14" class="bone" stroke-width="1.5"/>
<line class="bone" x1="282" y1="114" x2="282" y2="160" stroke-width="2"/>
<path d="M282 160 Q270 165 258 162" class="bone" stroke-width="2"/>
<line class="bone" x1="282" y1="160" x2="282" y2="290" stroke-width="2.5"/>
<line class="bone" x1="282" y1="290" x2="292" y2="290" stroke-width="2"/>
<path d="M282 160 Q290 200 294 260 Q296 275 292 290" class="bone" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 3"/>
<!-- Load bars — single leg max -->
<rect class="hip-load load-bar" x="248" y="306" width="68" height="7"/>
<rect class="knee-load load-bar" x="248" y="316" width="68" height="6"/>
<rect class="sij-load load-bar" x="248" y="325" width="60" height="5"/>
<text class="note" x="282" y="342" text-anchor="middle">single-leg max</text>
<text class="dc" x="282" y="352" text-anchor="middle">DC-1.2 DC-1.3</text>

<!-- ── PHASE 4: TERMINAL STANCE / TOE-OFF ── x=395 -->
<text class="phase-label" x="395" y="55" text-anchor="middle">Toe-off</text>
<line class="ground" x1="359" y1="290" x2="431" y2="290"/>
<ellipse cx="395" cy="100" rx="12" ry="14" class="bone" stroke-width="1.5"/>
<line class="bone" x1="395" y1="114" x2="395" y2="160" stroke-width="2"/>
<path d="M395 160 Q383 165 371 162" class="bone" stroke-width="2"/>
<path d="M395 160 Q390 200 380 240 L372 290" class="bone" stroke-width="2"/>
<path d="M372 290 Q376 285 386 290" class="bone" stroke-width="2"/>
<path d="M395 160 Q402 196 408 248 Q412 275 407 290" class="bone" stroke-width="1.5" opacity="0.5"/>
<!-- Load bars — ankle push-off -->
<rect class="hip-load load-bar" x="361" y="306" width="40" height="7"/>
<rect class="knee-load load-bar" x="361" y="316" width="50" height="6"/>
<rect class="sij-load load-bar" x="361" y="325" width="30" height="5"/>
<text class="note" x="395" y="342" text-anchor="middle">ankle push-off</text>
<text class="dc" x="395" y="352" text-anchor="middle">DC-2.3 elastic</text>

<!-- ── PHASE 5: SWING ── x=508 -->
<text class="phase-label" x="508" y="55" text-anchor="middle">Swing phase</text>
<line class="ground" x1="472" y1="290" x2="544" y2="290"/>
<ellipse cx="508" cy="100" rx="12" ry="14" class="bone" stroke-width="1.5"/>
<line class="bone" x1="508" y1="114" x2="508" y2="160" stroke-width="2"/>
<path d="M508 160 Q496 165 484 162" class="bone" stroke-width="2"/>
<line class="bone" x1="508" y1="160" x2="504" y2="290" stroke-width="2.5"/>
<line class="bone" x1="500" y1="290" x2="512" y2="290" stroke-width="2"/>
<!-- Swing leg -->
<path d="M508 160 Q524 186 530 216 Q536 240 526 260" class="bone" stroke-width="1.5" stroke-dasharray="4 3"/>
<path d="M526 260 Q528 272 522 278" class="bone" stroke-width="1.5" stroke-dasharray="4 3"/>
<!-- Load bars — low (single stance other side) -->
<rect class="hip-load load-bar" x="474" y="306" width="22" height="7"/>
<rect class="knee-load load-bar" x="474" y="316" width="18" height="6"/>
<rect class="sij-load load-bar" x="474" y="325" width="24" height="5"/>
<text class="note" x="508" y="342" text-anchor="middle">~40% of cycle</text>
<text class="dc" x="508" y="352" text-anchor="middle">low load phase</text>

<!-- ── PHASE 6: TERMINAL SWING ── x=621 -->
<text class="phase-label" x="621" y="55" text-anchor="middle">Terminal swing</text>
<line class="ground" x1="585" y1="290" x2="657" y2="290"/>
<ellipse cx="621" cy="100" rx="12" ry="14" class="bone" stroke-width="1.5"/>
<line class="bone" x1="621" y1="114" x2="621" y2="160" stroke-width="2"/>
<path d="M621 160 Q609 165 597 162" class="bone" stroke-width="2"/>
<line class="bone" x1="621" y1="160" x2="617" y2="290" stroke-width="2.5"/>
<line class="bone" x1="613" y1="290" x2="625" y2="290" stroke-width="2"/>
<path d="M621 160 Q632 188 638 240 L634 290" class="bone" stroke-width="1.5" opacity="0.6"/>
<line class="bone" x1="630" y1="290" x2="642" y2="290" stroke-width="1.5" opacity="0.6"/>
<!-- Load bars — preparation for heel strike -->
<rect class="hip-load load-bar" x="587" y="306" width="50" height="7"/>
<rect class="knee-load load-bar" x="587" y="316" width="35" height="6"/>
<rect class="sij-load load-bar" x="587" y="325" width="42" height="5"/>
<text class="note" x="621" y="342" text-anchor="middle">pre-impact load</text>
<text class="dc" x="621" y="352" text-anchor="middle">→ heel strike again</text>

<!-- Cycle return arrow -->
<path d="M650 380 Q665 395 340 408 Q15 395 30 380" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="5 4"/>
<text class="note" x="340" y="420" text-anchor="middle">gait cycle repeats — cumulative loading accumulates over thousands of cycles per day → DC-3.3 monitoring requirement</text>

<!-- Legend -->
<rect x="190" y="362" width="300" height="52" rx="3" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
<rect class="hip-load load-bar" x="204" y="374" width="20" height="8"/>
<text class="note" x="230" y="382">hip / SIJ load (DC-4.1)</text>
<rect class="knee-load load-bar" x="204" y="388" width="20" height="8"/>
<text class="note" x="230" y="396">knee load (DC-4.1)</text>
<rect class="sij-load load-bar" x="300" y="374" width="20" height="8"/>
<text class="note" x="326" y="382">SIJ nutation (DC-1.1)</text>
<text class="note" x="300" y="402">bar width = relative load magnitude</text>
</svg>
