<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520" role="img" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif">
<title>Joint range of motion — biological envelope vs actuator constraint</title>
<desc>Five major joints shown as arc diagrams. Warm dashed arcs show the biological ROM. Blue solid arcs show the actuator constraint that must not exceed the biological envelope.</desc>
<defs>
  <style>
    .label { font-size:13px; fill:#4b5563; }
    .sub { font-size:11px; fill:#6b7280; }
    .bio { fill:none; stroke:#B45309; stroke-width:2; stroke-dasharray:5 3; opacity:0.7; }
    .bio-fill { fill:none; stroke:#B45309; stroke-width:12; opacity:0.07; }
    .act { fill:none; stroke:#1D4ED8; stroke-width:2.5; opacity:0.85; }
    .joint { fill:none; stroke:#374151; stroke-width:1.5; }
    .joint-fill { fill:#374151; opacity:0.4; }
    .bone { fill:none; stroke:#374151; stroke-width:2.5; stroke-linecap:round; }
    .note { font-size:10px; fill:#9ca3af; }
    .title { font-size:12px; fill:#6b7280; }
    .highlight-bio { font-size:10px; fill:#B45309; }
    .highlight-act { font-size:10px; fill:#1D4ED8; }
  </style>
</defs>

<text class="title" x="340" y="22" text-anchor="middle">Joint range of motion — biological envelope vs. actuator constraint</text>

<!-- ── HIP ── -->
<g transform="translate(82,230)">
  <path class="bio-fill" d="M-65,-25 A70,70 0 0,1 65,-25"/>
  <path class="bio" d="M-65,-25 A70,70 0 0,1 65,-25"/>
  <path class="act" d="M-54,-35 A62,62 0 0,1 54,-35"/>
  <circle class="joint" cx="0" cy="0" r="13"/>
  <circle class="joint-fill" cx="0" cy="0" r="5"/>
  <path d="M-14,-6 A16,16 0 0,1 14,-6" fill="none" stroke="#374151" stroke-width="1.2" opacity="0.5"/>
  <line class="bone" x1="0" y1="13" x2="0" y2="65"/>
  <text class="label" x="0" y="84" text-anchor="middle">Hip</text>
  <text class="sub" x="0" y="97" text-anchor="middle">120° flex / 45° abduct</text>
  <text class="highlight-bio" x="0" y="110" text-anchor="middle">bio: 140° total arc</text>
  <text class="highlight-act" x="0" y="122" text-anchor="middle">act: constrained — DC-2.1</text>
</g>

<!-- ── KNEE ── -->
<g transform="translate(210,230)">
  <path class="bio-fill" d="M0,-70 A70,70 0 0,0 -68,-14"/>
  <path class="bio" d="M0,-70 A70,70 0 0,0 -68,-14"/>
  <path class="act" d="M0,-60 A60,60 0 0,0 -58,-12"/>
  <circle class="joint" cx="0" cy="0" r="13"/>
  <circle class="joint-fill" cx="0" cy="0" r="5"/>
  <circle cx="16" cy="0" r="7" fill="none" stroke="#374151" stroke-width="1" opacity="0.4"/>
  <line class="bone" x1="0" y1="-13" x2="0" y2="-68"/>
  <line class="bone" x1="0" y1="13" x2="0" y2="65"/>
  <text class="label" x="0" y="84" text-anchor="middle">Knee</text>
  <text class="sub" x="0" y="97" text-anchor="middle">135° flex, locking ext.</text>
  <text class="highlight-bio" x="0" y="110" text-anchor="middle">bio: 135° flex arc</text>
  <text class="highlight-act" x="0" y="122" text-anchor="middle">screw-home — DC-2.4</text>
</g>

<!-- ── ANKLE ── -->
<g transform="translate(338,230)">
  <path class="bio-fill" d="M-32,-62 A70,70 0 0,1 32,-62"/>
  <path class="bio" d="M-32,-62 A70,70 0 0,1 32,-62"/>
  <path class="bio" d="M0,-70 A70,70 0 0,1 64,28" opacity="0.5"/>
  <path class="act" d="M-24,-55 A58,58 0 0,1 24,-55"/>
  <circle class="joint" cx="0" cy="0" r="13"/>
  <circle class="joint-fill" cx="0" cy="0" r="5"/>
  <line class="bone" x1="0" y1="-13" x2="0" y2="-68"/>
  <path d="M13,0 Q30,10 54,8" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <text class="label" x="0" y="84" text-anchor="middle">Ankle</text>
  <text class="sub" x="0" y="97" text-anchor="middle">20° dorsiflex + 50° plantar</text>
  <text class="highlight-bio" x="0" y="110" text-anchor="middle">bio: 70° combined arc</text>
  <text class="highlight-act" x="0" y="122" text-anchor="middle">elastic compliance — DC-2.3</text>
</g>

<!-- ── SHOULDER ── -->
<g transform="translate(466,230)">
  <path class="bio-fill" d="M-70,0 A70,70 0 0,1 70,0"/>
  <path class="bio" d="M-70,0 A70,70 0 0,1 70,0"/>
  <path class="act" d="M-60,0 A60,60 0 0,1 60,0"/>
  <circle class="joint" cx="0" cy="0" r="15"/>
  <circle class="joint-fill" cx="0" cy="0" r="6"/>
  <path d="M-10,-14 A16,16 0 0,1 10,-14" fill="none" stroke="#374151" stroke-width="1" opacity="0.4"/>
  <line class="bone" x1="0" y1="15" x2="0" y2="65"/>
  <text class="label" x="0" y="84" text-anchor="middle">Shoulder</text>
  <text class="sub" x="0" y="97" text-anchor="middle">180° abduction</text>
  <text class="highlight-bio" x="0" y="110" text-anchor="middle">bio: 180° arc (ball+socket)</text>
  <text class="highlight-act" x="0" y="122" text-anchor="middle">dynamic stabilise — DC-2.2</text>
</g>

<!-- ── ELBOW ── -->
<g transform="translate(590,230)">
  <path class="bio-fill" d="M0,-70 A70,70 0 0,1 68,-14"/>
  <path class="bio" d="M0,-70 A70,70 0 0,1 68,-14"/>
  <path class="act" d="M0,-60 A60,60 0 0,1 58,-12"/>
  <circle class="joint" cx="0" cy="0" r="13"/>
  <circle class="joint-fill" cx="0" cy="0" r="5"/>
  <line class="bone" x1="0" y1="-13" x2="0" y2="-68"/>
  <line class="bone" x1="0" y1="13" x2="0" y2="65"/>
  <text class="label" x="0" y="84" text-anchor="middle">Elbow</text>
  <text class="sub" x="0" y="97" text-anchor="middle">145° flex</text>
  <text class="highlight-bio" x="0" y="110" text-anchor="middle">bio: 145° flex arc</text>
  <text class="highlight-act" x="0" y="122" text-anchor="middle">low priority — DC-4.1</text>
</g>

<!-- Legend -->
<rect x="160" y="440" width="360" height="56" rx="4" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
<line x1="178" y1="458" x2="204" y2="458" stroke="#B45309" stroke-width="2" stroke-dasharray="5 3" opacity="0.8"/>
<text class="sub" x="210" y="462">biological ROM envelope</text>
<line x1="178" y1="478" x2="204" y2="478" stroke="#1D4ED8" stroke-width="2.5" opacity="0.85"/>
<text class="sub" x="210" y="482">actuator constraint (must not exceed bio envelope)</text>

<text class="note" x="340" y="508" text-anchor="middle">Exceeding the biological ROM limit replicates the loading condition that produces degenerative joint changes in the osteological record — DC-2.1</text>
</svg>
