<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" role="img" font-family="'IBM Plex Sans','Helvetica Neue',Arial,sans-serif">
<title>Upper vs lower limb load asymmetry from bipedal osteology</title>
<desc>Bar chart and schematic showing the load asymmetry between upper and lower limbs derived from osteological evidence. Lower limbs bear 3-5x static body weight dynamically. Upper limbs bear minimal locomotor load.</desc>
<defs>
  <style>
    .label { font-size:13px; fill:#374151; }
    .sub { font-size:11px; fill:#6b7280; }
    .note { font-size:10px; fill:#9ca3af; }
    .title { font-size:12px; fill:#6b7280; }
    .axis { stroke:#d1d5db; stroke-width:0.5; }
    .bar-low { fill:#1D4ED8; opacity:0.8; }
    .bar-high { fill:#B45309; opacity:0.8; }
    .bone-heavy { stroke:#374151; stroke-width:3; stroke-linecap:round; fill:none; }
    .bone-light { stroke:#374151; stroke-width:1.5; stroke-linecap:round; fill:none; opacity:0.5; }
    .dc { font-size:10px; fill:#1D4ED8; font-weight:600; }
    .arrow { stroke:#9ca3af; stroke-width:1; fill:none; }
  </style>
  <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="title" x="340" y="22" text-anchor="middle">Upper vs lower limb load asymmetry — derived from bipedal osteological evidence</text>

<!-- ── LEFT: skeleton schematic showing asymmetry ── -->
<!-- Torso reference -->
<rect x="140" y="100" width="50" height="110" rx="4" fill="none" stroke="#d1d5db" stroke-width="1"/>
<text class="note" x="165" y="165" text-anchor="middle">torso</text>

<!-- Upper arm — light bone -->
<line class="bone-light" x1="140" y1="118" x2="100" y2="190"/>
<circle cx="140" cy="118" r="7" fill="none" stroke="#374151" stroke-width="1.2" opacity="0.5"/>
<text class="note" x="84" y="200" text-anchor="middle">humerus</text>
<text class="note" x="84" y="212" text-anchor="middle">(light)</text>

<!-- Lower arm — lighter -->
<line class="bone-light" x1="100" y1="190" x2="86" y2="260"/>
<circle cx="100" cy="190" r="5" fill="none" stroke="#374151" stroke-width="1" opacity="0.4"/>

<!-- Pelvis -->
<path d="M130,212 Q165,204 200,212 Q206,228 200,238 Q165,244 130,238 Q124,228 130,212Z" fill="none" stroke="#374151" stroke-width="1.5"/>

<!-- Femur — heavy bone -->
<line class="bone-heavy" x1="140" y1="244" x2="136" y2="330"/>
<circle cx="140" cy="244" r="9" fill="none" stroke="#374151" stroke-width="1.5"/>
<text class="note" x="118" y="345" text-anchor="middle">femur</text>
<text class="note" x="118" y="357" text-anchor="middle">(heavy)</text>

<!-- Knee -->
<circle cx="136" cy="330" r="8" fill="none" stroke="#374151" stroke-width="1.5"/>

<!-- Tibia — heavy -->
<line class="bone-heavy" x1="133" y1="338" x2="128" y2="410"/>
<circle cx="128" cy="410" r="5" fill="none" stroke="#374151" stroke-width="1.5"/>
<text class="note" x="110" y="425" text-anchor="middle">tibia</text>
<text class="note" x="110" y="437" text-anchor="middle">(heavy)</text>

<!-- Load arrows pointing down on lower limb -->
<line class="arrow" x1="136" y1="255" x2="136" y2="295" marker-end="url(#arr2)"/>
<line class="arrow" x1="130" y1="348" x2="130" y2="388" marker-end="url(#arr2)"/>
<text class="note" x="155" y="282" fill="#B45309">load</text>
<text class="note" x="149" y="375" fill="#B45309">load</text>

<!-- Upper limb annotation: minimal load -->
<text class="note" x="68" y="155" fill="#1D4ED8">minimal</text>
<text class="note" x="68" y="167" fill="#1D4ED8">locomotor</text>
<text class="note" x="68" y="179" fill="#1D4ED8">load</text>

<!-- ── RIGHT: bar chart ── -->
<!-- Axis -->
<line class="axis" x1="300" y1="80" x2="300" y2="420"/>
<line class="axis" x1="300" y1="420" x2="660" y2="420"/>

<!-- Y axis labels -->
<text class="note" x="296" y="424" text-anchor="end">0×</text>
<text class="note" x="296" y="354" text-anchor="end">1×</text>
<text class="note" x="296" y="284" text-anchor="end">2×</text>
<text class="note" x="296" y="214" text-anchor="end">3×</text>
<text class="note" x="296" y="144" text-anchor="end">4×</text>
<text class="note" x="296" y="84" text-anchor="end">5×</text>

<!-- Y axis gridlines -->
<line x1="300" y1="420" x2="655" y2="420" stroke="#f3f4f6" stroke-width="8"/>
<line x1="300" y1="350" x2="655" y2="350" stroke="#f3f4f6" stroke-width="0.5"/>
<line x1="300" y1="280" x2="655" y2="280" stroke="#f3f4f6" stroke-width="0.5"/>
<line x1="300" y1="210" x2="655" y2="210" stroke="#f3f4f6" stroke-width="0.5"/>
<line x1="300" y1="140" x2="655" y2="140" stroke="#f3f4f6" stroke-width="0.5"/>
<line x1="300" y1="70" x2="655" y2="70" stroke="#f3f4f6" stroke-width="0.5"/>

<!-- Bars: upper limb components (low, blue) -->
<rect class="bar-low" x="318" y="404" width="44" height="16" rx="2"/>
<text class="sub" x="340" y="440" text-anchor="middle">Shoulder</text>
<text class="note" x="340" y="452" text-anchor="middle">~0.2× BW</text>

<rect class="bar-low" x="382" y="396" width="44" height="24" rx="2"/>
<text class="sub" x="404" y="440" text-anchor="middle">Elbow</text>
<text class="note" x="404" y="452" text-anchor="middle">~0.3× BW</text>

<rect class="bar-low" x="446" y="398" width="44" height="22" rx="2"/>
<text class="sub" x="468" y="440" text-anchor="middle">Wrist</text>
<text class="note" x="468" y="452" text-anchor="middle">~0.3× BW</text>

<!-- Bars: lower limb components (high, amber) -->
<rect class="bar-high" x="510" y="210" width="44" height="210" rx="2"/>
<text class="sub" x="532" y="440" text-anchor="middle">Hip</text>
<text class="note" x="532" y="452" text-anchor="middle">3–4× BW</text>

<rect class="bar-high" x="574" y="140" width="44" height="280" rx="2"/>
<text class="sub" x="596" y="440" text-anchor="middle">Knee</text>
<text class="note" x="596" y="452" text-anchor="middle">4–5× BW</text>

<!-- DC label -->
<text class="dc" x="560" y="130">DC-3.2</text>
<line x1="570" y1="134" x2="596" y2="142" stroke="#1D4ED8" stroke-width="0.5" opacity="0.6"/>

<!-- Legend -->
<rect x="46" y="456" width="284" height="14" rx="2" fill="#1D4ED8" opacity="0.8"/>
<text class="note" x="188" y="466" text-anchor="middle" fill="white">upper limb — minimal locomotor load</text>
<rect x="338" y="456" width="284" height="14" rx="2" fill="#B45309" opacity="0.8"/>
<text class="note" x="480" y="466" text-anchor="middle" fill="white">lower limb — 3–5× body weight dynamically</text>

<!-- Y axis title -->
<text class="note" x="310" y="60" text-anchor="middle">load (× body weight)</text>
</svg>
