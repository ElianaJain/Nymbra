<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #fafaf7; }
      .module { fill: #ffffff; stroke: #2b2b2b; stroke-width: 1.5; }
      .module-accent { fill: #fef3e7; stroke: #92400e; stroke-width: 1.5; }
      .module-external { fill: #f3f4f6; stroke: #6b7280; stroke-width: 1.2; stroke-dasharray: 3 2; }
      .module-title { font-size: 13px; font-weight: 600; fill: #1f2937; }
      .module-detail { font-size: 10px; fill: #4b5563; }
      .module-label { font-size: 8px; font-weight: 600; fill: #6b7280; letter-spacing: 0.12em; text-transform: uppercase; }
      .flow { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .flow-return { stroke: #6b7280; stroke-width: 1; fill: none; stroke-dasharray: 4 3; marker-end: url(#arrow-light); }
      .flow-label { font-size: 10px; fill: #1f2937; font-weight: 500; }
      .flow-label-return { font-size: 9px; fill: #6b7280; font-style: italic; }
      .title { font-size: 18px; font-weight: 600; fill: #1f2937; letter-spacing: 0.01em; }
      .subtitle { font-size: 11px; fill: #6b7280; letter-spacing: 0.05em; }
      .section-label { font-size: 9px; font-weight: 600; fill: #9ca3af; letter-spacing: 0.15em; text-transform: uppercase; }
      .decision { fill: #fef3e7; stroke: #92400e; stroke-width: 1.5; }
      .decision-text { font-size: 11px; font-weight: 600; fill: #92400e; }
      .legend-text { font-size: 10px; fill: #4b5563; }
      .pill { fill: #1f2937; }
      .pill-text { font-size: 9px; fill: #fafaf7; font-weight: 600; letter-spacing: 0.08em; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="700"/>

  <!-- Title -->
  <text class="title" x="40" y="45">Nymbra — Component Diagram</text>
  <text class="subtitle" x="40" y="64">DATA FLOW THROUGH A SINGLE CONVERSATION TURN</text>

  <!-- Section: Input -->
  <text class="section-label" x="40" y="110">Input</text>

  <!-- Handler voice input -->
  <rect class="module-external" x="40" y="125" width="160" height="70" rx="2"/>
  <text class="module-label" x="52" y="145">EXTERNAL</text>
  <text class="module-title" x="52" y="162">Handler voice</text>
  <text class="module-detail" x="52" y="180">Explicit verbal cue</text>

  <!-- Session control -->
  <rect class="module" x="240" y="125" width="160" height="70" rx="2"/>
  <text class="module-label" x="252" y="145">MODULE</text>
  <text class="module-title" x="252" y="162">Session Control</text>
  <text class="module-detail" x="252" y="180">Start / pause / end</text>

  <!-- Audio capture -->
  <rect class="module" x="440" y="125" width="160" height="70" rx="2"/>
  <text class="module-label" x="452" y="145">MODULE</text>
  <text class="module-title" x="452" y="162">Audio Capture</text>
  <text class="module-detail" x="452" y="180">STT, buffer, timestamp</text>

  <!-- Flow arrows (input row) -->
  <line class="flow" x1="200" y1="160" x2="238" y2="160"/>
  <line class="flow" x1="400" y1="160" x2="438" y2="160"/>
  <text class="flow-label" x="205" y="152">verbal cue</text>
  <text class="flow-label" x="405" y="152">session active</text>

  <!-- Section: Processing -->
  <text class="section-label" x="40" y="250">Processing</text>

  <!-- LLM integration -->
  <rect class="module" x="40" y="265" width="200" height="85" rx="2"/>
  <text class="module-label" x="52" y="285">MODULE</text>
  <text class="module-title" x="52" y="302">LLM Integration</text>
  <text class="module-detail" x="52" y="320">Provider-agnostic interface.</text>
  <text class="module-detail" x="52" y="335">Claude / ChatGPT / other.</text>

  <!-- Uncertainty detection (accented) -->
  <rect class="module-accent" x="280" y="265" width="200" height="85" rx="2"/>
  <text class="module-label" x="292" y="285">MODULE — RESEARCH CORE</text>
  <text class="module-title" x="292" y="302">Uncertainty Detection</text>
  <text class="module-detail" x="292" y="320">Flags unverifiable claims.</text>
  <text class="module-detail" x="292" y="335">Surfaces in plain language.</text>

  <!-- Refusal handling -->
  <rect class="module" x="520" y="265" width="200" height="85" rx="2"/>
  <text class="module-label" x="532" y="285">MODULE</text>
  <text class="module-title" x="532" y="302">Refusal Handling</text>
  <text class="module-detail" x="532" y="320">Governance-defined decline.</text>
  <text class="module-detail" x="532" y="335">Logs reason codes.</text>

  <!-- Flow arrows (processing) -->
  <line class="flow" x1="600" y1="195" x2="140" y2="263"/>
  <text class="flow-label" x="350" y="225">transcript</text>

  <line class="flow" x1="240" y1="307" x2="278" y2="307"/>
  <line class="flow" x1="480" y1="307" x2="518" y2="307"/>
  <text class="flow-label" x="243" y="300">response</text>
  <text class="flow-label" x="483" y="300">check</text>

  <!-- Decision diamond: uncertain? -->
  <text class="section-label" x="40" y="405">Decision Gate</text>
  <polygon class="decision" points="400,430 470,470 400,510 330,470"/>
  <text class="decision-text" x="380" y="468" text-anchor="middle">Uncertain</text>
  <text class="decision-text" x="400" y="483" text-anchor="middle">or refused?</text>

  <!-- Flow into decision -->
  <line class="flow" x1="380" y1="350" x2="395" y2="428"/>

  <!-- Section: Output -->
  <text class="section-label" x="40" y="560">Output</text>

  <!-- Check-in path (yes) -->
  <rect class="module-accent" x="40" y="575" width="200" height="85" rx="2"/>
  <text class="module-label" x="52" y="595">MODULE</text>
  <text class="module-title" x="52" y="612">Check-in Response</text>
  <text class="module-detail" x="52" y="630">"I'm not sure about this."</text>
  <text class="module-detail" x="52" y="645">Pauses, asks handler.</text>

  <!-- Normal response path -->
  <rect class="module" x="340" y="575" width="200" height="85" rx="2"/>
  <text class="module-label" x="352" y="595">MODULE</text>
  <text class="module-title" x="352" y="612">Response Synthesis</text>
  <text class="module-detail" x="352" y="630">TTS + movement cue.</text>
  <text class="module-detail" x="352" y="645">Embodied delivery.</text>

  <!-- Logging (always-on sidecar) -->
  <rect class="module" x="640" y="575" width="200" height="85" rx="2"/>
  <text class="module-label" x="652" y="595">SIDECAR</text>
  <text class="module-title" x="652" y="612">Logging</text>
  <text class="module-detail" x="652" y="630">Turn, timestamp, flags.</text>
  <text class="module-detail" x="652" y="645">Local storage only.</text>

  <!-- Decision output flows -->
  <line class="flow" x1="350" y1="490" x2="180" y2="573"/>
  <text class="flow-label" x="220" y="535">yes → check in</text>

  <line class="flow" x1="430" y1="485" x2="440" y2="573"/>
  <text class="flow-label" x="445" y="535">no → respond</text>

  <!-- Logging connections (dashed, from multiple points) -->
  <path class="flow-return" d="M 740 350 Q 760 460 740 573"/>
  <text class="flow-label-return" x="750" y="460">all events</text>

  <!-- Legend -->
  <g transform="translate(40, 675)">
    <rect class="module-accent" x="0" y="-10" width="12" height="12"/>
    <text class="legend-text" x="18" y="0">Research core — the novel contribution of this project</text>
    <rect class="module-external" x="280" y="-10" width="12" height="12"/>
    <text class="legend-text" x="298" y="0">External (outside system)</text>
    <line class="flow-return" x1="490" y1="-4" x2="510" y2="-4"/>
    <text class="legend-text" x="516" y="0">Sidecar log flow</text>
  </g>
</svg>
